appId: com.jessica12ryan.fpp-flasher
productName: FPP Flasher

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: images/icon.ico
  artifactName: FPP-Flasher-${version}-${os}.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: images/icon.icns
  artifactName: FPP-Flasher-${version}-${os}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: images/icon.png
  artifactName: FPP-Flasher-${version}-${os}.${ext}