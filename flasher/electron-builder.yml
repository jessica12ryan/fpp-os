appId: com.jessica12ryan.fpp-os-usb-flasher
productName: FPP-OS USB Flasher

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png