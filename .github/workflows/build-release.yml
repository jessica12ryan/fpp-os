name: Build and Release FPP-OS ISO

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/.gitignore'
      - '**/*.md'
      - '**/*.txt'
      - '**/*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0). Leave blank to auto-generate.'
        required: false
        default: ''

jobs:
  build-iso:
    name: Build FPP-OS ISO
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so git log/tag history is fully available

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xorriso isolinux syslinux-common rsync curl \
            python3 ca-certificates cpio gzip file fdisk mtools dosfstools

      - name: Read and bump version
        id: version
        run: |
          VERSION_FILE="VERSION.txt"
          CURRENT_VERSION=$(cat "$VERSION_FILE")
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          PATCH="${PATCH:-0}"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > "$VERSION_FILE"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Capture LAST_TAG NOW — before any new commits or tags exist
          git fetch --tags
          LAST_TAG=$(git tag --sort=-version:refname | grep -v "^latest$" | head -1)
          echo "Last tag: ${LAST_TAG:-none}"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Download latest FPP install script
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/FalconChristmas/fpp/master/SD/FPP_Install.sh \
            -o SD/FPP_Install.sh
          chmod +x SD/FPP_Install.sh

      - name: Update CHANGELOG.md
        run: |
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          CURRENT_VERSION="${{ steps.version.outputs.version }}"

          if [[ -z "$LAST_TAG" ]]; then
            GIT_LOG=$(git log --pretty=format:"- %s (%an)")
          else
            GIT_LOG=$(git log --pretty=format:"- %s (%an)" "${LAST_TAG}..HEAD")
          fi

          FILTERED_LOG=$(echo "$GIT_LOG" | grep -v "github-actions") || FILTERED_LOG=""

          echo "Commits since ${LAST_TAG:-beginning}:"
          echo "$FILTERED_LOG"

          DATE=$(date -u +"%Y-%m-%d")
          ENTRY="## [${CURRENT_VERSION}] - ${DATE}\n\n${FILTERED_LOG}\n\n---\n\n"

          if [[ -f CHANGELOG.md ]]; then
            echo -e "${ENTRY}$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "# Changelog\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit and push pre-build changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add VERSION.txt CHANGELOG.md SD/FPP_Install.sh
          git commit -m "Bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Create version branch
        run: |
          git checkout -B "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}" --force

      - name: Generate preseed
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          envsubst '${VERSION}' < preseed/fpp.template.preseed > preseed/fpp.preseed

      - name: Build FPP-OS ISO
        run: |
          chmod +x scripts/build-iso.sh
          sudo bash -c "NEW_VERSION='${{ steps.version.outputs.version }}' bash scripts/build-iso.sh"
          sudo chown "$USER":"$USER" fpp-os-*.iso 2>/dev/null || true

      - name: Verify ISO output
        run: |
          ISO=$(ls fpp-os-*.iso 2>/dev/null | head -1)
          if [[ -z "$ISO" ]]; then
            echo "ERROR: No ISO file found after build!" >&2
            exit 1
          fi
          echo "ISO_FILE=$ISO" >> "$GITHUB_ENV"
          ls -lh "$ISO"
          file "$ISO"

      - name: Generate checksums
        run: |
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          md5sum    "$ISO_FILE" > "${ISO_FILE}.md5"
          cat "${ISO_FILE}.sha256"
          cat "${ISO_FILE}.md5"

      - name: Read latest CHANGELOG entry
        id: changelog
        run: |
          NOTES=$(awk '/^---$/{n++} n==1{next} n==2{exit} {print}' CHANGELOG.md | tail -n +3)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "FPP-OS – ${{ steps.version.outputs.version }}"
          body: |
            ## FPP-OS Install ISO

            Bootable ISO that installs FPP using a Debian-based environment.

            **WARNING: All data will be wiped on local drive automatically once booted from the ISO!**

            ### How to use
            See [README.md](../../blob/master/README.md) for installation instructions.

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ### Checksums
            See attached `.sha256` and `.md5` files.

            ---
            Commit: `${{ github.sha }}`  |  Run: `${{ github.run_id }}`
          files: |
            ${{ env.ISO_FILE }}
            ${{ env.ISO_FILE }}.sha256
            ${{ env.ISO_FILE }}.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpp-os-iso
          path: |
            ${{ env.ISO_FILE }}
            ${{ env.ISO_FILE }}.sha256
            ${{ env.ISO_FILE }}.md5
          retention-days: 14
